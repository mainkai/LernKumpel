            const ctx = ctxRef.current;
            const osc = ctx.createOscillator(); const gain = ctx.createGain();
            osc.type = type; osc.frequency.setValueAtTime(freq, ctx.currentTime);
            gain.gain.setValueAtTime(vol, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + duration);
            osc.connect(gain); gain.connect(ctx.destination);

          const playWhoopeeSound = useCallback(() => {

            const now = ctx.currentTime;

            const lowOsc = ctx.createOscillator();
            const buzzOsc = ctx.createOscillator();
            const lowGain = ctx.createGain();
            const buzzGain = ctx.createGain();
            const lowpass = ctx.createBiquadFilter();

            lowpass.type = 'lowpass';

            buzzOsc.detune.setValueAtTime(8, now);

            const noiseData = noiseBuffer.getChannelData(0);
            for (let i = 0; i < noiseData.length; i++) {

            }

            const updateScale = () => {
              const CANVAS_WIDTH = 448;
              const CANVAS_HEIGHT = 920;
              const padding = 32;

              const winW = window.innerWidth;
              const winH = window.innerHeight;

              const scaleW = winW / (CANVAS_WIDTH + padding);
              const scaleH = winH / (CANVAS_HEIGHT + padding);

              setScale(Math.min(scaleW, scaleH, 1.2));
            };

            updateScale();
            window.addEventListener('resize', updateScale);
            return () => window.removeEventListener('resize', updateScale);
          }, []);

          return scale;
        }

                  else if (op === '+') { num1 = (Math.floor(Math.random() * 50) + 10) * 10; num2 = (Math.floor(Math.random() * 40) + 1) * 10; answer = num1 + num2; } 
                  else { num1 = (Math.floor(Math.random() * 50) + 50) * 10; num2 = (Math.floor(Math.random() * 40) + 10) * 10; answer = num1 - num2; }
                  break;
                case 4:
                default:
                  ops = ['+', '-', '*', '/']; op = ops[Math.floor(Math.random() * ops.length)];
                  if (op === '*') { num1 = Math.floor(Math.random() * 15) + 2; num2 = Math.floor(Math.random() * 8) + 2; answer = num1 * num2; } 
                  else if (op === '/') { num2 = Math.floor(Math.random() * 9) + 2; answer = Math.floor(Math.random() * 20) + 5; num1 = answer * num2; } 
                  else if (op === '+') { num1 = (Math.floor(Math.random() * 50) + 10) * 100; num2 = (Math.floor(Math.random() * 40) + 10) * 100; answer = num1 + num2; } 
                  else { num1 = (Math.floor(Math.random() * 90) + 10) * 100; num2 = (Math.floor(Math.random() * 80) + 1) * 100; if (num2 > num1) { let t = num1; num1 = num2; num2 = t; } answer = num1 - num2; }
                  break;
              }
              problemSignature = `${num1}${op}${num2}`;
              attempts++;
            } while (sessionProblemsRef.current.has(problemSignature) && attempts < 50);
            
            if (attempts >= 50) {
              sessionProblemsRef.current.clear();
            }
            sessionProblemsRef.current.add(problemSignature);

            let missingPart = 'answer';
            if (mode === 'gap') missingPart = ['num1', 'num2'][Math.floor(Math.random() * 2)];

            const currentThemeData = THEMES[themeId] || THEMES.classic;
            const randomIcon = currentThemeData.problemIcons[Math.floor(Math.random() * currentThemeData.problemIcons.length)];

            setProblem({ num1, num2, op, answer, missingPart, icon: randomIcon });
            setUserAnswer('');
            setAttemptsLeft(MAX_ATTEMPTS);
            setFeedback(null);
            setLastBonusEarned(0);
            setProblemStartTime(Date.now());
          }, []);

          const startGame = () => {
            initAudio();
            setScore(0);
            setProblemsDone(0);
            setStreak(0);
            setRoundRank(null);
            setRoundRewards({ coins: 0, sticker: null, adventureStar: 0, unlockedWorlds: [], worldRewardCoins: 0, unusedBonusPoints: 0, bonusUsed: false, boxReward: null });
            setRoundBonusAvailable(albumBonusUnlocked);
            setRoundBonusUsed(false);
            generateProblem(level, gameMode, currentThemeId);
            setScreen('game');
          };

          const getExpectedAnswer = useCallback(() => {
            if (problem.missingPart === 'num1') return problem.num1;
            if (problem.missingPart === 'num2') return problem.num2;
            return problem.answer;
          }, [problem]);

          const handleGameEnd = async (baseScore, finalStreak, bonusUnusedAtEnd = false) => {
            const unusedBonusPoints = bonusUnusedAtEnd ? BONUS_STAR_ENDGAME_POINTS : 0;
            const finalScore = baseScore + unusedBonusPoints;
            let earnedCoins = Math.floor(finalScore / 10); 
            let newSticker = null;
            let updatedStickers = [...(profile.stickers || [])];
            let earnedAdventureStar = 0;
            let unlockedWorlds = [];
            let worldRewardCoins = 0;

            if (finalStreak === MAX_PROBLEMS) {
              const missingStickers = STICKER_POOL.filter(s => !updatedStickers.includes(s));
              if (missingStickers.length > 0) {
                newSticker = missingStickers[Math.floor(Math.random() * missingStickers.length)];
                updatedStickers.push(newSticker);
                playTada();
              } else {
                earnedCoins += 50;
              }
            }

            const completedAlbumThisRound = hasCompletedStickerAlbum(updatedStickers) && !fullStickerAlbum;

            if (finalStreak === MAX_PROBLEMS && hasCompletedStickerAlbum(updatedStickers)) {
              earnedAdventureStar = 1;
            }

            const previousAdventureStars = profile.adventureStars || 0;
            const nextAdventureStars = previousAdventureStars + earnedAdventureStar;
            const previousCompletedWorlds = getCompletedWorldCount(previousAdventureStars);
            const nextProgress = getAdventureWorldProgress(nextAdventureStars);
            const nextCompletedWorlds = nextProgress.filter((world) => world.completed).length;

            if (nextCompletedWorlds > previousCompletedWorlds) {
              unlockedWorlds = nextProgress.slice(previousCompletedWorlds, nextCompletedWorlds);
              worldRewardCoins = unlockedWorlds.reduce((sum, world) => sum + world.coinReward, 0);
              earnedCoins += worldRewardCoins;
            }

            setRoundRewards({
              coins: earnedCoins,
              sticker: newSticker,
              adventureStar: earnedAdventureStar,
              unlockedWorlds: unlockedWorlds.map((world) => ({ name: world.name, coinReward: world.coinReward, themeSlotReward: world.themeSlotReward })),
              worldRewardCoins,
              unusedBonusPoints,
              bonusUsed: roundBonusUsed,
              boxReward: null
            });
            
            let rank = null;
            if (finalScore > 0) {
              const relevantScores = highscores.filter(h => Number(h.level) === Number(level) && (h.mode || 'normal') === gameMode);
              let calculatedRank = 1;
              for (let s of relevantScores) {
                if (finalScore > s.score) break;
                calculatedRank++;
              }
              if (calculatedRank <= 10) rank = calculatedRank;
              setRoundRank(rank);

              try {
                await addDoc(collection(db, DB_COLLECTIONS.appHighscores), {
                  appId: APP_ID,
                  profileId: activeProfileId,
                  name: profile.name,
                  avatar: profile.avatar,
                  score: finalScore,
                  level: level,
                  mode: gameMode,
                  theme: currentThemeId,
                  timestamp: Date.now()
                });
              } catch (e) { console.error(e); }
            }

            const profileRef = doc(db, DB_COLLECTIONS.profiles, activeProfileId);
            await updateDoc(profileRef, {
              coins: (profile.coins || 0) + earnedCoins,
              stickers: updatedStickers,
              albumBonusUnlocked: albumBonusUnlocked || completedAlbumThisRound,
              adventureStars: (profile.adventureStars || 0) + earnedAdventureStar
            });

            setScreen('result');
          };

          const advanceRound = (nextScore, nextStreak, delay, bonusUnusedAtEnd = false) => {
            setTimeout(() => {
              if (problemsDone + 1 >= MAX_PROBLEMS) {
                setProblemsDone(prev => prev + 1);
                handleGameEnd(nextScore, nextStreak, bonusUnusedAtEnd);
              } else {
                setProblemsDone(prev => prev + 1);
                generateProblem(level, gameMode, currentThemeId);
              }
            }, delay);
          };

          const checkAnswer = useCallback(() => {
            if (userAnswer === '' || feedback) return;

            const expected = getExpectedAnswer();
            const isCorrect = parseInt(userAnswer, 10) === expected;

            if (isCorrect) {
              playSuccess();
              setFeedback('success');
              const perfectSolve = attemptsLeft === 3 ? calculatePerfectSolveBonus() : null;
              let pointsEarned = perfectSolve ? perfectSolve.pointsEarned : attemptsLeft === 2 ? 50 + (gameMode === 'gap' ? 20 : 0) : 20 + (gameMode === 'gap' ? 20 : 0);

              let currentStreak = perfectSolve ? perfectSolve.currentStreak : 0;
              setStreak(currentStreak);
              let comboBonus = perfectSolve ? perfectSolve.comboBonus : currentStreak >= 3 ? 30 : 0; 

              let speedBonus = 0;
              if (perfectSolve) speedBonus = perfectSolve.speedBonus;
              
              setLastBonusEarned(speedBonus + comboBonus);
              const newScore = score + pointsEarned + speedBonus + comboBonus;
              setScore(newScore);

              advanceRound(newScore, currentStreak, 2000, roundBonusAvailable);
            } else {
              playError();
              setStreak(0);
              if (attemptsLeft > 1) {
                setFeedback('error');
                setAttemptsLeft(prev => prev - 1);
                setUserAnswer('');
                setTimeout(() => setFeedback(null), 1200);
              } else {
                setFeedback('fatal');

                advanceRound(score, 0, 3500, roundBonusAvailable);
              }
            }
          }, [userAnswer, feedback, getExpectedAnswer, playSuccess, attemptsLeft, gameMode, playError, score, roundBonusAvailable, calculatePerfectSolveBonus]);

          const useRoundBonusStar = useCallback(() => {
            if (!roundBonusAvailable || feedback) return;

            const { pointsEarned, currentStreak, comboBonus, speedBonus } = calculatePerfectSolveBonus();
            const totalBonusPoints = pointsEarned + comboBonus + speedBonus;

            playSuccess();
            setRoundBonusAvailable(false);
            setRoundBonusUsed(true);
            setStreak(currentStreak);
            setLastBonusEarned(speedBonus + comboBonus);
            setUserAnswer(String(getExpectedAnswer()));
            setFeedback('bonus');
            setScore(prev => prev + totalBonusPoints);

            advanceRound(score + totalBonusPoints, currentStreak, 1800, false);
          }, [roundBonusAvailable, feedback, calculatePerfectSolveBonus, playSuccess, getExpectedAnswer, score]);

          const handleInput = useCallback((val) => {
            if (feedback === 'success' || feedback === 'fatal' || feedback === 'bonus') return;
            playClick();
            setUserAnswer(prev => prev.length >= 5 ? prev : prev + val);
          }, [feedback, playClick]);

          const handleDelete = useCallback(() => {
            if (feedback === 'success' || feedback === 'fatal' || feedback === 'bonus') return;
            playClick();
            setUserAnswer('');
          }, [feedback, playClick]);

          // Tastatursteuerung
          const stateRef = useRef({ screen, checkAnswer, handleInput, handleDelete, useRoundBonusStar });
          useEffect(() => { stateRef.current = { screen, checkAnswer, handleInput, handleDelete, useRoundBonusStar }; }, [screen, checkAnswer, handleInput, handleDelete, useRoundBonusStar]);
          useEffect(() => {
            const handleKeyDown = (e) => {
              const { screen, checkAnswer, handleInput, handleDelete, useRoundBonusStar } = stateRef.current;
              if (screen !== 'game') return;
              if (e.key >= '0' && e.key <= '9') handleInput(e.key);
              else if (e.key === 'Enter') { e.preventDefault(); checkAnswer(); }
              else if (e.key === 'Backspace' || e.key === 'Delete' || e.key.toLowerCase() === 'c') handleDelete();
              else if (e.key === '*') useRoundBonusStar();
            };
            window.addEventListener('keydown', handleKeyDown);
            return () => window.removeEventListener('keydown', handleKeyDown);

                  <span className="text-xl">🪙</span>

                  </div>
                  <button
                    onClick={() => { setScreen('setup'); playClick(); }}
                    className="shrink-0 w-full bg-sky-100 hover:bg-sky-200 text-sky-800 font-bold py-4 rounded-2xl flex items-center justify-center gap-2 transition-colors border-2 border-sky-200 border-dashed"
                  >
                    <Users size={20} /> Neuen Spieler hinzufügen
                  </button>
                </div>

            if (screen === 'setup') {
              return (

                  <p className="text-gray-500 font-medium mb-6 text-sm">Tipp: Wenn du schon auf einem anderen Gerät gespielt hast, benutze genau denselben Namen!</p>

                  <div className="mb-6">

                  </div>

                  <div className={`${theme.numpadBg} p-4 sm:p-6 rounded-b-2xl transition-colors duration-500`}>
                    <div className="grid grid-cols-3 gap-3 sm:gap-4">
                      {renderCalculatorButton('7', () => handleInput('7'))} {renderCalculatorButton('8', () => handleInput('8'))} {renderCalculatorButton('9', () => handleInput('9'))}
                      {renderCalculatorButton('4', () => handleInput('4'))} {renderCalculatorButton('5', () => handleInput('5'))} {renderCalculatorButton('6', () => handleInput('6'))}
                      {renderCalculatorButton('1', () => handleInput('1'))} {renderCalculatorButton('2', () => handleInput('2'))} {renderCalculatorButton('3', () => handleInput('3'))}
                      {renderCalculatorButton('C', handleDelete, theme.btnDelete)} {renderCalculatorButton('0', () => handleInput('0'))}
                      <button onClick={checkAnswer} className={`aspect-square rounded-xl text-2xl font-black flex flex-col items-center justify-center active:translate-y-2 active:shadow-none transition-all ${theme.btnAction}`}>
                        <Check size={32} strokeWidth={4} /><span className="text-sm"></span>
                      </button>
                    </div>

                    <div className="mt-8 text-center">
                      <button onClick={() => { playClick(); setScreen('start'); }} className="text-white/60 hover:text-white flex items-center justify-center gap-2 transition-colors mx-auto font-bold uppercase tracking-wider text-sm">
                        <ArrowLeft size={18} /> Menü
                      </button>
                    </div>
                  </div>
                </div>
              );
            }

            return null;
          };

          const isNeutralBg = !user || screen === 'profile_select' || screen === 'setup' || screen === 'loading';

          return (
            <div className={`fixed inset-0 flex items-center justify-center overflow-hidden transition-colors duration-500 ${isNeutralBg ? 'bg-sky-200' : theme.pageBg} font-sans`}>
              <div
                style={{
                  width: `${CANVAS_WIDTH}px`,
                  height: `${CANVAS_HEIGHT}px`,
                  transform: `scale(${appScale})`,
                  transformOrigin: 'center'
                }}
                className="relative flex flex-col"
              >
                <TopBar />
                <div className="flex-1 w-full flex flex-col items-center justify-center pt-20 pb-4 px-2 sm:px-4 min-h-0">
                  {renderScreenContent()}
                </div>
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
